<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Öğrenci Ana Sayfa</title>

<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    background: #f3f3f3;
  }

  header {
    background: #bd081c;
    padding: 20px;
    color: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .logout-btn {
    color: #fff;
    text-decoration: none;
    cursor: pointer;
    font-size: 16px;
  }

  .container {
    padding: 20px;
  }

  .event-box {
    background: white;
    padding: 15px;
    margin-top: 15px;
    border-radius: 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }
  .event-box h3 {
    margin: 0;
    color: #c40000;
  }
</style>

<script>
// Öğrenci giriş kontrolü
if (localStorage.getItem("studentLogin") !== "ok") {
    window.location.href = "giris.html";
}
</script>

</head>
<body>

<header>
  <h1>Öğrenci Ana Sayfası</h1>
  <a class="logout-btn" onclick="logout()">Çıkış</a>
</header>

<div class="container">
  <h2>Etkinlikler</h2>
  <div id="event-list"></div>
</div>

<script>
// Çıkış
function logout() {
  localStorage.removeItem("studentLogin");
  window.location.href = "giris.html";
}

// Etkinlikleri göster
function loadEvents() {
  let events = JSON.parse(localStorage.getItem("events") || "[]");
  let area = document.getElementById("event-list");

  if (events.length === 0) {
    area.innerHTML = "<p>Henüz etkinlik eklenmemiş.</p>";
    return;
  }

  area.innerHTML = "";

  events.forEach(evt => {
    area.innerHTML += `
      <div class="event-box">
        <h3>${evt.title}</h3>
        <b>Tarih:</b> ${evt.date}<br>
        <p>${evt.desc}</p>
      </div>
    `;
  });
}

loadEvents();
</script>

</body>
</html>
